[phases.setup]
nixPkgs = ['php82', 'php82Extensions.pdo', 'php82Extensions.pdo_mysql', 'php82Extensions.mbstring', 'php82Extensions.tokenizer', 'php82Extensions.xml', 'php82Extensions.dom', 'php82Extensions.curl', 'php82Extensions.fileinfo', 'php82Extensions.openssl', 'php82Extensions.ctype', 'php82Extensions.filter', 'php82Extensions.session', 'php82Extensions.gd', 'php82Packages.composer', 'nodejs']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader', 'npm ci']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'php artisan storage:link && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-9000}'